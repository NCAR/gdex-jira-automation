name: Scheduled Events

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes (adjust as needed)
  workflow_dispatch:  # manual trigger for both branches

permissions:
  contents: write
  pull-requests: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    environment: PROD_JIRA_API_TOKEN
    env:
      TZ: America/Denver  # Mountain Time (MDT/MST)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

      - name: Pull latest changes
        run: git pull origin ${{ github.ref_name }}   # pulls the current branch

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Print Working Directory and Python Path
        run: |
          echo "Current directory: $(pwd)"
          python -c "import sys; print(sys.path)"

      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV  # Add the root directory to PYTHONPATH

      - name: Run Jira Client
        run: python entrypoints/run_scheduled.py
        env:
          PROD_JIRA_API_TOKEN: ${{ secrets.PROD_JIRA_API_TOKEN }}

  # Cron job: This will only run for `main` branch
  cron-job:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'  # Ensures this job runs only for the `main` branch
    schedule:
      - cron: '*/5 * * * *'   # Schedule this cron job only on `main` branch
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Run cron-specific task
        run: |
          echo "This is a scheduled task that only runs on the main branch."
