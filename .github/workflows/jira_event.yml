name: Jira Event

on:
  repository_dispatch:
    types: [jira-event]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    environment: PROD_JIRA_API_TOKEN
    env:
      TZ: America/Denver  # Mountain Time (MDT/MST)
    
    steps:
      - name: Use the API payload variables
        env:
          PAYLOAD_TICKET_ID: #${{ github.event.inputs.ticket_id }}
          PAYLOAD_CUSTOMER_REQUEST: #${{ github.event.inputs.customer_request }}
        run: |
          echo "Ticket ID: ${{ github.event.inputs.ticket_id }}"
          echo "Request Type: ${{ github.event.inputs.customer_request }}"
          
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
    
      - name: Pull latest changes
        run: git pull --rebase origin main
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV  # Add the root directory to PYTHONPATH

      - name: Install Dependencies 
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      
      - name: Run Jira Client
        run: python entrypoints/run_scheduled.py
        env:
          PROD_JIRA_API_TOKEN: ${{ secrets.PROD_JIRA_API_TOKEN }}
