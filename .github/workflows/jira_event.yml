name: Jira Event

on:
  repository_dispatch:
    types: [jira-event]
  workflow_dispatch: 

permissions:
  contents: write
  pull-requests: write

jobs:
  health-check:
    runs-on: ubuntu-latest
    environment: GDEX_JIRA_PRODUCTION_ENV
    env:
      TZ: America/Denver  # Mountain Time (MDT/MST)
    
    steps:
      - name: Use the JIRA API payload variables
        run: |
          echo "Ticket ID: ${{ github.event.client_payload.ticket_id }}"
      
      - name: Write Google API credentials to file
        run: |
          echo "${{ secrets.GOOGLE_CREDENTIALS }}" > workflow/event/curation/credentials.json
          echo "Google API credentials written to file."

      - name: Write Google Token to file
        run: |
          echo "${{ secrets.GOOGLE_TOKEN }}" > workflow/event/curation/token.json
          echo "Google API token written to file."
          
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      
      - name: Set PYTHONPATH
        run: |
          echo "PYTHONPATH=$(pwd)" >> $GITHUB_ENV  # Add the root directory to PYTHONPATH

      - name: Install Dependencies 
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          
      - name: Check installed packages
        run: pip list
      
      - name: Run Jira Client
        run: python entrypoints/run_event.py
        env:
          PROD_JIRA_API_TOKEN: ${{ secrets.PROD_JIRA_API_TOKEN }}
          PAYLOAD_TICKET_ID: ${{ github.event.client_payload.ticket_id }}
