workflow_map:
  Curation Tickets:
    workflow: workflows.event.curation.cost_summary.generate_cost_summary
    tickets:
      - Suggest Dataset for GDEX

  Submission Tickets:
    workflow: 
      - workflows.event.curation.cost_summary.generate_cost_summary
      - workflows.event.curation.auto_response.dda_response.generate_dda_response
    tickets:
      - Submit Your Data to GDEX

  DMP Tickets:
    workflow:
      - workflows.event.curation.cost_summary.generate_cost_summary
      - workflows.event.curation.switch_status.generate_switch_status
    tickets:
      - Request for a proposal data management plan and budget

  Service Tickets:
    workflow: 
    - workflows.event.services.ticket_assignment.assign_unassigned_tickets
    - workflows.event.services.ticket_priority.prioritize_incoming_ticket
    tickets:
      - General Data Help
      - Dataset Questions
      - Web Site Problems
      - Web Services & APIs
      - Data Download Problem